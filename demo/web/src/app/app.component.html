<main class="page">
  <header class="hero">
    <p class="eyebrow">Open source · Morocco · 2025 fiscal rules</p>
    <h1>maroctax</h1>
    <p class="lead">
      Moroccan payroll calculator — CNSS, AMO, IR, net salary, and employer cost.
      Built in TypeScript, Java, and Dart.
    </p>
    <div class="links">
      <a [href]="githubUrl" target="_blank" rel="noopener">GitHub</a>
      <span class="sep">·</span>
      <span>{{ apiDocsHint }}</span>
    </div>
  </header>

  <section class="grid">
    <maroctax-simulator />
    <div>
      <p class="card-label">Example payslip (8 000 MAD · 2 dependents)</p>
      <maroctax-payslip [gross]="8000" [dependents]="2" />
    </div>
  </section>

  <footer>
  <p>MIT License · <a [href]="githubUrl" target="_blank" rel="noopener">Hamza-spc/maroctax</a></p>
  </footer>
</main>
