name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  typescript:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typescript/maroctax
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: typescript/maroctax/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build

  java-core:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java/maroctax-core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - run: mvn -B test

  java-starter:
    runs-on: ubuntu-latest
    needs: java-core
    defaults:
      run:
        working-directory: java/maroctax-spring-boot-starter
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - run: mvn -B install -DskipTests -f ../maroctax-core/pom.xml
      - run: mvn -B test

  java-api:
    runs-on: ubuntu-latest
    needs: [java-core, java-starter]
    defaults:
      run:
        working-directory: java/maroctax-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - run: mvn -B install -DskipTests -f ../maroctax-core/pom.xml
      - run: mvn -B install -DskipTests -f ../maroctax-spring-boot-starter/pom.xml
      - run: mvn -B test

  dart-core:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dart/maroctax
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - run: dart analyze
      - run: dart test

  flutter:
    runs-on: ubuntu-latest
    needs: dart-core
    defaults:
      run:
        working-directory: dart/maroctax_flutter
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  angular-lib:
    runs-on: ubuntu-latest
    needs: typescript
    defaults:
      run:
        working-directory: angular/maroctax-angular
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: typescript/maroctax
      - run: npm run build
        working-directory: typescript/maroctax
      - run: npm ci
      - run: npm test
      - run: npm run build

  demo:
    runs-on: ubuntu-latest
    needs: [typescript, angular-lib]
    defaults:
      run:
        working-directory: demo/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: typescript/maroctax
      - run: npm run build
        working-directory: typescript/maroctax
      - run: npm ci
        working-directory: angular/maroctax-angular
      - run: npm run build
        working-directory: angular/maroctax-angular
      - run: npm ci
      - run: npm run build
