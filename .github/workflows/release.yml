name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  call-ci:
    uses: ./.github/workflows/ci.yml

  publish-npm-core:
    needs: call-ci
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typescript/maroctax
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-npm-angular:
    needs: publish-npm-core
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: angular/maroctax-angular
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm ci
        working-directory: typescript/maroctax
      - run: npm run build
        working-directory: typescript/maroctax
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pub:
    needs: call-ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: dart pub get
        working-directory: dart/maroctax
      - run: dart test
        working-directory: dart/maroctax
      - run: dart pub publish --force
        working-directory: dart/maroctax
        env:
          PUB_CREDENTIALS: ${{ secrets.PUB_CREDENTIALS }}
      - run: flutter pub get
        working-directory: dart/maroctax_flutter
      - run: flutter test
        working-directory: dart/maroctax_flutter
      - run: dart pub publish --force
        working-directory: dart/maroctax_flutter
        env:
          PUB_CREDENTIALS: ${{ secrets.PUB_CREDENTIALS }}

  publish-maven:
    needs: call-ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: ${{ secrets.GPG_PASSPHRASE }}
      - run: mvn -B install -DskipTests -f java/maroctax-core/pom.xml
      - run: mvn -B deploy -DskipTests -f java/maroctax-core/pom.xml
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
      - run: mvn -B deploy -DskipTests -f java/maroctax-spring-boot-starter/pom.xml
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}

  deploy-demo:
    needs: call-ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci && npm run build
        working-directory: typescript/maroctax
      - run: npm ci && npm run build
        working-directory: angular/maroctax-angular
      - run: npm ci && npm run build
        working-directory: demo/web
      - uses: actions/upload-pages-artifact@v3
        with:
          path: demo/web/dist/web/browser

  pages:
    needs: deploy-demo
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  github-release:
    needs: [call-ci, deploy-demo]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body_path: CHANGELOG.md
